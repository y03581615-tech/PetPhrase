<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>PetPhrase 设置</title>
  </head>
  <body>
    <div id="app">
      <header class="page-tabs">
        <button class="page-tab active" data-page="phrases">常用语</button>
        <button class="page-tab" data-page="appearance">外观与行为</button>
      </header>

      <!-- 常用语管理 -->
      <div id="page-phrases" class="page">
        <aside class="sidebar">
          <div id="group-list" class="group-list"></div>
          <div class="sidebar-footer">
            <button id="add-group" class="btn subtle"></button>
          </div>
        </aside>
        <section class="content">
          <div id="group-header" class="group-header"></div>
          <div id="phrase-list" class="phrase-list"></div>
          <div class="add-phrase">
            <textarea id="new-phrase" rows="2" placeholder="输入新常用语,可多行…"></textarea>
            <button id="add-phrase" class="btn primary">添加</button>
          </div>
        </section>
      </div>

      <!-- 外观与行为 -->
      <div id="page-appearance" class="page" hidden>
        <div class="appearance-scroll">
          <h3>桌宠形象</h3>
          <p class="hint">
            扫描内置宠物、~/.codex/pets(npx petdex 安装位置)与自定义目录,兼容 petdex 格式。
          </p>
          <div id="pet-grid" class="pet-grid"></div>
          <div class="row">
            <button id="pick-pet-dir" class="btn subtle">选择自定义宠物目录…</button>
            <span id="custom-dir" class="hint"></span>
          </div>

          <h3>面板主题</h3>
          <div class="row" id="theme-row">
            <label><input type="radio" name="theme" value="acrylic" /> 亚克力磨砂(默认)</label>
            <label><input type="radio" name="theme" value="solid" /> 实底浅色</label>
          </div>

          <h3>行为</h3>
          <div class="row">
            <label><input type="checkbox" id="autostart" /> 开机自动启动</label>
          </div>

          <h3>数据</h3>
          <div class="row">
            <button id="export" class="btn subtle">导出常用语…</button>
            <button id="import" class="btn subtle">导入常用语…</button>
            <span id="data-msg" class="hint"></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/settings/settings.ts"></script>
  </body>
</html>
